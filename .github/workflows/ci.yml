name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests + license gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Python 3.12)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Install workspace (editable)
        # One command installs every workspace member editable + the shared dev
        # tooling from the root pyproject; a new package under packages/ or apps/
        # is picked up automatically (no install list to maintain here). The LGPL
        # svg2pptx `raster-fallback` extra and the heavy `docling` extra are NOT
        # enabled (kept isolated — SPEC §2 / NOTICE).
        run: uv sync --all-packages --locked

      - name: License gate (fail on GPL/AGPL — SPEC §2)
        run: .venv/bin/python scripts/license_scan.py

      - name: Run tests
        run: .venv/bin/python -m pytest -q
