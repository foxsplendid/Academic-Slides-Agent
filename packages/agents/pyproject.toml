[project]
name = "asa-agents"
version = "0.1.0"
description = "Provider-agnostic agents that produce Slide-IR for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["asa-slide-ir"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.uv.sources]
asa-slide-ir = { path = "../core/ir", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asa_agents"]
