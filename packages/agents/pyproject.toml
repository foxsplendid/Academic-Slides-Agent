[project]
name = "asa-agents"
version = "0.1.0"
description = "Provider-agnostic agents that produce Slide-IR for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["asa-slide-ir", "asa-pptx-compiler", "langgraph>=0.2"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asa_agents"]
