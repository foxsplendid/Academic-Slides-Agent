[project]
name = "asa-providers"
version = "0.1.0"
description = "Real LLM provider adapters (OpenAI-compatible, Anthropic) for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.40"]
all = ["openai>=1.0", "anthropic>=0.40"]
dev = ["pytest>=8", "asa-agents"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["asa_providers"]
