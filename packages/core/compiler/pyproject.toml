[project]
name = "asa-pptx-compiler"
version = "0.1.0"
description = "Deterministic Slide-IR -> native .pptx compiler for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["python-pptx>=1.0", "asa-slide-ir"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.uv.sources]
asa-slide-ir = { path = "../ir", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pptx_compiler"]
