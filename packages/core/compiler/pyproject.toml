[project]
name = "asa-pptx-compiler"
version = "0.1.0"
description = "Deterministic Slide-IR -> native .pptx compiler for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["python-pptx>=1.0", "asa-slide-ir"]

[project.optional-dependencies]
dev = ["pytest>=8"]
# Optional engine for the premium VisualCanvas tier (SVG -> editable DrawingML).
# The compiler fails open when it is absent (see canvas.py canvas_engine_available),
# so it is declared optional, not required. In the workspace it is always present.
canvas = ["asa-svg2pptx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pptx_compiler"]
