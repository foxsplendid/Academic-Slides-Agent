[project]
name = "asa-formula"
version = "0.1.0"
description = "LaTeX -> image formula rendering for Academic-Slides-Agent (matplotlib mathtext, MVP)."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["matplotlib>=3.7"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["formula_render"]
