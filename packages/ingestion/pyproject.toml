[project]
name = "asa-ingestion"
version = "0.1.0"
description = "Ingest papers and supplementary data into an Evidence Pool for Academic-Slides-Agent."
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["asa-slide-ir", "openpyxl>=3.1", "pdfplumber>=0.11", "pypdfium2>=4", "Pillow>=10"]

[project.optional-dependencies]
dev = ["pytest>=8"]
docling = ["docling>=2"]  # optional Tier-2 PDF backend (MIT); heavy (PyTorch + models)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ingestion"]
